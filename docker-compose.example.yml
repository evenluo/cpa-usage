services:
  cpa-usage:
    image: ${CPA_USAGE_IMAGE:?set CPA_USAGE_IMAGE to an immutable version tag}
    ports:
      - "8080:8080"
    environment:
      CPA_BASE_URL: ${CPA_BASE_URL}
      CPA_MANAGEMENT_KEY: ${CPA_MANAGEMENT_KEY}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      CPA_USAGE_LOGIN_PASSWORD: ${CPA_USAGE_LOGIN_PASSWORD:-}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-168h}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-cpa_usage_session}
      AUTH_SESSION_COOKIE_DOMAIN: ${AUTH_SESSION_COOKIE_DOMAIN:-}
      AUTH_SESSION_COOKIE_PATH: ${AUTH_SESSION_COOKIE_PATH:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      APP_PORT: ${APP_PORT:-8080}
      APP_BASE_PATH: ${APP_BASE_PATH:-}
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_QUEUE_ADDR: ${REDIS_QUEUE_ADDR:-}
      REDIS_QUEUE_TLS: ${REDIS_QUEUE_TLS:-false}
      REDIS_QUEUE_BATCH_SIZE: ${REDIS_QUEUE_BATCH_SIZE:-1000}
      REDIS_QUEUE_IDLE_INTERVAL: ${REDIS_QUEUE_IDLE_INTERVAL:-1s}
      USAGE_ROLLUP_BACKFILL_BATCH_HOURS: ${USAGE_ROLLUP_BACKFILL_BATCH_HOURS:-24}
      USAGE_ROLLUP_BACKFILL_IDLE_INTERVAL: ${USAGE_ROLLUP_BACKFILL_IDLE_INTERVAL:-2s}
      USAGE_ROLLUP_BACKFILL_ERROR_BACKOFF: ${USAGE_ROLLUP_BACKFILL_ERROR_BACKOFF:-30s}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30s}
      TLS_SKIP_VERIFY: ${TLS_SKIP_VERIFY:-false}
      WORK_DIR: ${WORK_DIR:-./data}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./data:/data
    restart: unless-stopped
