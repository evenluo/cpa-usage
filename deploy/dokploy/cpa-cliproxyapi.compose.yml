services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cliproxyapi}
      POSTGRES_USER: ${POSTGRES_USER:-cliproxyapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cpa-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cliproxyapi:
    image: ${CLIPROXYAPI_IMAGE:-eceasy/cli-proxy-api:v7.2.62}
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:?set MANAGEMENT_PASSWORD}
      MANAGEMENT_STATIC_PATH: /tmp/cliproxyapi-static
      PGSTORE_DSN: postgresql://${POSTGRES_USER:-cliproxyapi}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cliproxyapi}?sslmode=disable
      PGSTORE_LOCAL_PATH: /tmp/cliproxyapi
      TZ: Asia/Shanghai
    networks:
      - cpa-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=cpa-dmit-us-internal
      - traefik.http.routers.cpa-api.rule=Host(`${PUBLIC_HOST:?set PUBLIC_HOST}`)
      - traefik.http.routers.cpa-api.entrypoints=websecure
      - traefik.http.routers.cpa-api.priority=10
      - traefik.http.routers.cpa-api.tls.certresolver=letsencrypt
      - traefik.http.services.cpa-api.loadbalancer.server.port=8317

  ingress:
    image: traefik:v3.6.7
    restart: unless-stopped
    mem_limit: 96m
    command:
      - --entrypoints.websecure.address=:8443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --accesslog=true
      - --certificatesresolvers.letsencrypt.acme.email=ops@maxtap.net
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    ports:
      - 127.0.0.1:8443:8443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - cpa-internal

volumes:
  postgres-data:
    external: true
    name: cpa-dmit-us-postgres-data
  traefik-acme:
    external: true
    name: cpa-dmit-us-traefik-acme

networks:
  cpa-internal:
    external: true
    name: cpa-dmit-us-internal
