services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cliproxyapi}
      POSTGRES_USER: ${POSTGRES_USER:-cliproxyapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cpa-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  cliproxyapi:
    image: ${CLIPROXYAPI_IMAGE:-eceasy/cli-proxy-api:v7.1.11}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:?set MANAGEMENT_PASSWORD}
      MANAGEMENT_STATIC_PATH: /tmp/cliproxyapi-static
      PGSTORE_DSN: postgresql://${POSTGRES_USER:-cliproxyapi}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cliproxyapi}?sslmode=disable
      PGSTORE_LOCAL_PATH: /tmp/cliproxyapi
      TZ: Asia/Shanghai
    networks:
      - cpa-internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.rule=Host(`${PUBLIC_HOST:?set PUBLIC_HOST}`)
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.entrypoints=web
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.middlewares=redirect-to-https@file
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.service=cpa-cliproxyapi-hazmcp-6-web
      - traefik.http.services.cpa-cliproxyapi-hazmcp-6-web.loadbalancer.server.port=8317
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.rule=Host(`${PUBLIC_HOST:?set PUBLIC_HOST}`)
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.entrypoints=websecure
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.service=cpa-cliproxyapi-hazmcp-6-websecure
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.cpa-cliproxyapi-hazmcp-6-websecure.loadbalancer.server.port=8317
      - traefik.http.routers.cliproxyapi-web.rule=Host(`${PUBLIC_HOST:?set PUBLIC_HOST}`)
      - traefik.http.routers.cliproxyapi-web.entrypoints=web
      - traefik.http.routers.cliproxyapi-web.priority=10
      - traefik.http.routers.cliproxyapi-web.middlewares=redirect-to-https@file
      - traefik.http.routers.cliproxyapi-web.service=cliproxyapi-web
      - traefik.http.services.cliproxyapi-web.loadbalancer.server.port=8317
      - traefik.http.routers.cliproxyapi-websecure.rule=Host(`${PUBLIC_HOST:?set PUBLIC_HOST}`)
      - traefik.http.routers.cliproxyapi-websecure.entrypoints=websecure
      - traefik.http.routers.cliproxyapi-websecure.priority=10
      - traefik.http.routers.cliproxyapi-websecure.service=cliproxyapi-websecure
      - traefik.http.routers.cliproxyapi-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.cliproxyapi-websecure.loadbalancer.server.port=8317

volumes:
  postgres-data:
    external: true
    name: ${POSTGRES_DATA_VOLUME:-cpa-cliproxyapi-hazmcp_cliproxyapi-postgres-data}

networks:
  cpa-internal:
    external: true
    name: ${CPA_INTERNAL_NETWORK:-cpa-cliproxyapi-hazmcp_cliproxyapi-internal}
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
