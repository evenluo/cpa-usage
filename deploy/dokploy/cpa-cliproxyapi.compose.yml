services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cliproxyapi}
      POSTGRES_USER: ${POSTGRES_USER:-cliproxyapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cpa-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  cliproxyapi:
    image: ${CLIPROXYAPI_IMAGE:-eceasy/cli-proxy-api:v7.1.11}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:?set MANAGEMENT_PASSWORD}
      MANAGEMENT_STATIC_PATH: /tmp/cliproxyapi-static
      PGSTORE_DSN: postgresql://${POSTGRES_USER:-cliproxyapi}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cliproxyapi}?sslmode=disable
      PGSTORE_LOCAL_PATH: /tmp/cliproxyapi
      TZ: Asia/Shanghai
    networks:
      - cpa-internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.rule=Host(`${PUBLIC_HOST:-example.com}`)
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.entrypoints=web
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.middlewares=redirect-to-https@file
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-web.service=cpa-cliproxyapi-hazmcp-6-web
      - traefik.http.services.cpa-cliproxyapi-hazmcp-6-web.loadbalancer.server.port=8317
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.rule=Host(`${PUBLIC_HOST:-example.com}`)
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.entrypoints=websecure
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.service=cpa-cliproxyapi-hazmcp-6-websecure
      - traefik.http.routers.cpa-cliproxyapi-hazmcp-6-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.cpa-cliproxyapi-hazmcp-6-websecure.loadbalancer.server.port=8317
      - traefik.http.routers.cliproxyapi-web.rule=Host(`${PUBLIC_HOST:-example.com}`)
      - traefik.http.routers.cliproxyapi-web.entrypoints=web
      - traefik.http.routers.cliproxyapi-web.priority=10
      - traefik.http.routers.cliproxyapi-web.middlewares=redirect-to-https@file
      - traefik.http.routers.cliproxyapi-web.service=cliproxyapi-web
      - traefik.http.services.cliproxyapi-web.loadbalancer.server.port=8317
      - traefik.http.routers.cliproxyapi-websecure.rule=Host(`${PUBLIC_HOST:-example.com}`)
      - traefik.http.routers.cliproxyapi-websecure.entrypoints=websecure
      - traefik.http.routers.cliproxyapi-websecure.priority=10
      - traefik.http.routers.cliproxyapi-websecure.service=cliproxyapi-websecure
      - traefik.http.routers.cliproxyapi-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.cliproxyapi-websecure.loadbalancer.server.port=8317

  cpa-usage:
    image: __CPA_USAGE_IMAGE__
    restart: unless-stopped
    depends_on:
      - cliproxyapi
    environment:
      GIN_MODE: release
      TZ: Asia/Shanghai
      APP_PORT: 8080
      APP_BASE_PATH: /usage
      CPA_BASE_URL: http://cliproxyapi:8317
      CPA_MANAGEMENT_KEY: ${MANAGEMENT_PASSWORD:?set MANAGEMENT_PASSWORD}
      REDIS_QUEUE_ADDR: cliproxyapi:8317
      AUTH_ENABLED: "true"
      CPA_USAGE_LOGIN_PASSWORD: ${CPA_USAGE_LOGIN_PASSWORD:?set CPA_USAGE_LOGIN_PASSWORD}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-168h}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-${MANAGEMENT_PASSWORD:?set MANAGEMENT_PASSWORD}}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-cpa_usage_session}
      AUTH_SESSION_COOKIE_DOMAIN: ${AUTH_SESSION_COOKIE_DOMAIN:-example.com}
      AUTH_SESSION_COOKIE_PATH: /
      WORK_DIR: /data
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - cpa-usage-data:/data
    networks:
      - cpa-internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cpa-usage-web.rule=Host(`${PUBLIC_HOST:-example.com}`) && PathPrefix(`/usage`)
      - traefik.http.routers.cpa-usage-web.entrypoints=web
      - traefik.http.routers.cpa-usage-web.priority=110
      - traefik.http.routers.cpa-usage-web.middlewares=redirect-to-https@file
      - traefik.http.routers.cpa-usage-web.service=cpa-usage-web
      - traefik.http.services.cpa-usage-web.loadbalancer.server.port=8080
      - traefik.http.routers.cpa-usage-websecure.rule=Host(`${PUBLIC_HOST:-example.com}`) && PathPrefix(`/usage`)
      - traefik.http.routers.cpa-usage-websecure.entrypoints=websecure
      - traefik.http.routers.cpa-usage-websecure.priority=110
      - traefik.http.routers.cpa-usage-websecure.service=cpa-usage-websecure
      - traefik.http.routers.cpa-usage-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.cpa-usage-websecure.loadbalancer.server.port=8080

volumes:
  cpa-usage-data:
    external: true
    name: ${CPA_USAGE_DATA_VOLUME:-cpa-cliproxyapi-hazmcp_cpa-usage-data}
  postgres-data:
    external: true
    name: ${POSTGRES_DATA_VOLUME:-cpa-cliproxyapi-hazmcp_cliproxyapi-postgres-data}

networks:
  cpa-internal:
    external: true
    name: ${CPA_INTERNAL_NETWORK:-cpa-cliproxyapi-hazmcp_cliproxyapi-internal}
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
