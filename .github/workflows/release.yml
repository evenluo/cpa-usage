name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOKPLOY_COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate version tag
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "release tag must be vX.Y.Z or vX.Y.Z-rc.N" >&2
            exit 1
          fi

      - name: Validate Dokploy configuration
        run: |
          set -euo pipefail
          for name in DOKPLOY_COMPOSE_ID DOKPLOY_URL DOKPLOY_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required" >&2
              exit 1
            fi
          done

      - name: Verify
        run: make verify

      - name: Prepare image metadata
        id: image
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "name=$image" >> "$GITHUB_OUTPUT"
          echo "short-sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "created=$created" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short-sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            SOURCE=https://github.com/${{ github.repository }}
            CREATED=${{ steps.image.outputs.created }}

      - name: Render and verify Dokploy compose
        env:
          CPA_USAGE_IMAGE: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
        run: |
          set -euo pipefail
          rendered="$RUNNER_TEMP/cpa-cliproxyapi.compose.yml"
          scripts/render-dokploy-compose.sh "$GITHUB_REF_NAME" "$rendered"
          scripts/verify-dokploy-compose.sh "$rendered"

      - name: Deploy via Dokploy API
        env:
          CPA_USAGE_IMAGE: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
        run: scripts/dokploy-deploy-compose.sh
